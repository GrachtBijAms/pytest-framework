environment: staging

environments:
  staging:
    base_url: "https://www.saucedemo.com/"
    api_base_url: "https://api.staging.yourapp.com"
  production:
    base_url: "https://www.saucedemo.com/"
    api_base_url: "https://api.yourapp.com"

browser:
  name: chromium        # chromium | firefox | webkit
  headless: false       # true in CI, false locally
  slow_mo: 0            # milliseconds between actions (useful for debugging)
  timeout: 30000        # default timeout in ms

api:
  timeout: 10           # seconds
  retry_attempts: 3

reporting:
  screenshot_on_failure: true
  video_on_failure: false